name: Selenium Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.38.1/allure-2.38.1.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.38.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run tests (headless)
        run: pytest --browser=chrome --headless --alluredir=allure-results

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean
    
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: screenshots/